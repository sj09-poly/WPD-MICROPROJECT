<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Background</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Video container */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        /* Make iframe cover screen */
        .video-bg iframe {
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* disable interaction */
        }

        /* Content on top */
        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            top: 40%;
        }
    </style>
</head>
<body>

    <!-- Background Video -->
    <div class="video-bg">
        <iframe 
            src="https://www.youtube.com/embed/s9xk77X4m5c?autoplay=1&mute=1&loop=1&playlist=s9xk77X4m5c&controls=0&showinfo=0&modestbranding=1"
            frameborder="0"
            allow="autoplay; fullscreen">
        </iframe>
    </div>

    <!-- Foreground Content -->
    <div class="content">
        <h1>Welcome</h1>
        <p>This is a video background website</p>
    </div>

</body>
</html>
