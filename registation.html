<!DOCTYPE html>
<html>
<head>
  <title>Seminar Registration Form</title>
</head>
<body>
<h2>Seminar Registration Form</h2>
<form>

  <label>Full Name:</label><br>
  <input type="text" name="name" required><br><br>

  <label>Age:</label><br>
  <input type="number" name="age" required><br><br>

  <label>Qualification:</label><br>
  <input type="text" name="qualification" required><br><br>

  <label>Contact Number:</label><br>
  <input type="tel" name="contact" required><br><br>

  <label>Email ID:</label><br>
  <input type="email" name="email" required><br><br>

  <label>Address:</label><br>
  <textarea name="address" rows="3" cols="30" required></textarea><br><br>

  <label>From where did you hear about the seminar?</label><br>
  <select name="source" required>
    <option value="">Select</option>
    <option>Social Media</option>
    <option>Friend / Family</option>
    <option>College / School</option>
    <option>Website</option>
    <option>Advertisement</option>
  </select><br><br>

  <input type="submit" value="Submit">

</form>
</body>
</html>
